[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "sbilifeco-kafka-producer-query-flow-events"
version = "0.1.6"
description = "Kafka producer that relays events produced by query flow as kafka messages"
dependencies = [
    "sbilifeco-models-base>=0.1.4",
    "sbilifeco-cp-kafka>=0.2.2",
    "sbilifeco-boundary-query-flow>=0.4.0",
    "sbilifeco-paths-query-flow>=0.2.0"
]