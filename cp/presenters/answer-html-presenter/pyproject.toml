[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "sbilifeco-presenter-html-query-flow-answers"
version = "0.1.4"
description = "Query flow answers presented as an HTML page"
dependencies = [
    "jinja2>=3.1.6",
    "sbilifeco-boundary-answer-notify-flow>=0.2.1",
    "sbilifeco-boundary-query-flow>=0.3.1",
]