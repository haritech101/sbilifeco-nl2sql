[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "sbilifeco-http-client-question-suggestion-flow"
version = "0.1.0"
description = "HTTP client to send requests to question suggestion flow"
dependencies = [
    "sbilifeco-cp-http-client>=0.1.3",
    "sbilifeco-paths-question-suggestion-flow>=0.1.0",
    "sbilifeco-boundary-question-suggestion-flow>=0.1.0",
]