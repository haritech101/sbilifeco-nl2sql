[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "sbilifeco-boundary-question-suggestion-flow"
version = "0.1.0"
description = "Contract class to build a flow to suggest questions possible for a given database schema"
dependencies = [
	"sbilifeco-models-base>=0.1.4"
]