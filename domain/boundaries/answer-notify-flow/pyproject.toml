[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "sbilifeco-boundary-answer-notify-flow"
version = "0.2.2"
description = "Contract for a flow that fetches answers and notifies about them"
dependencies = [
    "sbilifeco-boundary-query-flow>=0.4.0"
]