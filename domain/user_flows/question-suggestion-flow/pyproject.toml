[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "sbilifeco-flow-question-suggestion"
version = "0.2.0"
description = "Flow for suggesting questions given a database ID. Implements IQuestionSuggestionFlow contract"
dependencies = [
    "sbilifeco-boundary-llm>=0.3.0",
    "sbilifeco-boundary-metadata-storage>=0.1.6",
    "sbilifeco-boundary-question-suggestion-flow>=0.2.0",
    "pyyaml>=6.0.2",
]