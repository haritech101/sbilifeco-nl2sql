<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="/editor-ui/css/bootstrap.min.css"
            rel="stylesheet"
            crossorigin="anonymous"
        />
        <script type="module" src="/editor-ui/scripts/home-bundle.js"></script>
        <title>File Editor</title>
    </head>
    <body>
        <div class="container d-flex flex-column vh-100 gap-2 p-3">
            <h1>File editor</h1>
            <p>Select a file to edit</p>
            <select class="form-control" id="which-file">
                <option value="">-- Select a file to edit --</option>
                <option value="test">Test</option>
                <option value="nb_schema">NB Schema</option>
                <option value="generic_prompt">Generic Prompt</option>
                <option value="nb_prompt">NB Prompt</option>
            </select>
            <div
                id="file-content"
                class="flex-grow-1 border container-fluid overflow-auto"
            ></div>
            <div id="feedback-panel" class="mt-3"></div>
            <button id="save-file" class="btn btn-primary mt-3 form-control">
                Save
            </button>
        </div>
    </body>
</html>
